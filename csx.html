        .hide-scroll::-webkit-scrollbar{display:none}.hide-scroll{-ms-overflow-style:none;scrollbar-width:none}

        @keyframes heroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        @keyframes pulseDot{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
        @keyframes scanline{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

        @keyframes waveIn{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        .hero-float{animation:heroFloat 4s ease-in-out infinite}
        .hero-stat{animation:countUp .6s ease-out forwards;opacity:0}

        .hero-stat:nth-child(2){animation-delay:.25s}
        .hero-stat:nth-child(3){animation-delay:.4s}

        .wave-in:nth-child(1){animation-delay:.05s}
        .wave-in:nth-child(2){animation-delay:.15s}
        .wave-in:nth-child(3){animation-delay:.25s}
